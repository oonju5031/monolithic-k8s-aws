logging:
    level:
        org:
            springframework: INFO

spring:
    datasource:
        driver-class-name: org.mariadb.jdbc.Driver
        # url: jdbc:mariadb://localhost:3306/inspire            # localhost용 (현 프로젝트의 경우 docker-compose에 설정되어 있기 때문에 localhost를 사용하여도 됨, but 안정성을 위해 환경변수 사용을 권장)
        # url: ${SPRING_DATASOURCE_URL}                         # docker용
        url: ${SPRING_DATASOURCE_URL:localhost:3306/inspire}    # localhost, docker 공용 (${SPRING_DATASOURCE_URL}을 찾지 못하면 localhost:3306/inspire를 사용)
        username: ${SPRING_DATASOURCE_USERNAME:root}
        password: ${SPRING_DATASOURCE_PASSWORD:akfldkqlqjs}

    data:
        redis:
            # host: localhost
            host: ${SPRING_REDIS_HOST:redis}  # TODO: localhost용 설정이 localhost -> redis가 됐는데 그래도 상관 없는지 확인 필요
            port: ${SPRING_REDIS_PORT:6379}
            password:
            timeout: 6000ms

    jpa:
        hibernate:
            ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:create}
        show-sql: ${SPRING_JPA_SHOW_SQL:true}
        properties:
            hibernate:
                dialect: org.hibernate.dialect.MariaDBDialect
                format_sql: true

jwt:
    secret: lg-cns-inspire-secret-key-for-jwt