name: deploy order

on:
    push:
        branches:
            - main

jobs:
    # job name
    build-and-deploy:
        # runner
        runs-on: ubuntu-latest

        # Git Action 명령어 일람: https://docs.github.com/ko/actions
        steps:
            -   name: checkout github
                uses: actions/checkout@v2

            -   name: install kubectl
                uses: azure/setup-kubectl@v3

            -   name: aws configure
                uses: aws-actions/configure-aws-credentials@v1
                with:
                    aws-access-key-id: ${{secrets.AWS_KEY}}
                    aws-secret-access-key: ${{secrets.AWS_SECRET_KEY}}
                    aws-region: us-west-2

            -   name: aws eks cluster update
                run: aws eks update-kubeconfig --region us-west-2 --name lgcns-jylee-cluster

            -   name: aws ecr login
                uses: aws-actions/amazon-ecr-login@v1

            -   name: image build and push docker image to ecr
                env:
                    REGISTRY: 957143340841.dkr.ecr.us-west-2.amazonaws.com
                    REPOSITORY: order-jylee-backend
                    IMAGE_TAG: latest
                run: |
                    docker build -t $REGISTRY/$REPOSITORY:$IMAGE_TAG -f Dockerfile .
                    docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG