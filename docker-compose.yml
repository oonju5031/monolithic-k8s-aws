version: "3"

services:
    backend:
        image: oonju5031/inspire-monolithic
        container_name: monolithic-backend-container
        ports:
            - "8080:8080"
        environment:
            # Database
#            SPRING_DATASOURCE_URL: jdbc:mariadb://database:3306/inspire
            SPRING_DATASOURCE_URL: jdbc:mariadb://lgcns-jylee.cxiu4oc2u2xz.us-west-2.rds.amazonaws.com:3306/inspire?useSSL=true&verifyServerCertificate=false
            SPRING_DATASOURCE_USERNAME: root
            SPRING_DATASOURCE_PASSWORD: 123456789
            # JPA
            SPRING_JPA_HIBERNATE_DDL_AUTO: create
            SPRING_JPA_SHOW_SQL: true
            # Redis
            SPRING_REDIS_HOST: redis
            SPRING_REDIS_PORT: 6379
        depends_on:
#            - database
            - redis
        restart: always

#    database:
#        image: oonju5031/inspire-mariadb
#        container_name: monolithic-mariadb-container
#        ports:
#            - "6033:3306"
#        environment:
#            MARIADB_USER: root
#            MARIADB_ROOT_PASSWORD: 12341234
#            MARIADB_DATABASE: inspire

    redis:
        image: oonju5031/inspire-redis
        container_name: monolithic-redis-container
        ports:
            - "6379:6379"
        restart: always